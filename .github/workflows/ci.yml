name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Build
        run: go build -o bin/ia-buscar ./cmd/ia-buscar
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v -race ./...